{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <span class="ai-badge">Telegram · 2FA</span>
    <h2 style="margin-top: var(--sp-2);">Подтверждение входа</h2>
    <p class="muted">Для аккаунта <b>{{ username }}</b> включено подтверждение через Telegram. Откройте бота и введите присланный код.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form action="/login/2fa" method="post">
      <label class="settings-field">
        <span>Код из Telegram</span>
        <input name="code" type="text" inputmode="numeric" autocomplete="one-time-code" required placeholder="123456" style="font-size: var(--fs-xl); letter-spacing: 0.2em; text-align:center;">
      </label>
      <button type="submit" class="btn" style="width:100%; margin-top: var(--sp-3);">Подтвердить вход</button>
    </form>
    <p class="muted" style="margin-top: var(--sp-3);">Код действует 5 минут.</p>
  </div>
</section>
{% endblock %}
